# Override per eseguire Ollama come container (Linux/server senza Ollama sull'host).
# Uso: docker compose -f docker-compose.yml -f docker-compose.ollama.yml up
services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"
  backend:
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - ollama
  worker:
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - ollama

volumes:
  ollama:
