name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: uppilot
          POSTGRES_PASSWORD: uppilot
          POSTGRES_DB: uppilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U uppilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_HOST: localhost
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest --ds=config.settings.test -q

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # npm install (non `npm ci`): il lockfile è generato in container e, per il bug
      # npm sulle dipendenze opzionali (npm/cli#4828), `npm ci` non installa il binario
      # nativo rollup per la piattaforma del runner. `npm install` lo ri-risolve.
      - run: npm install
      - run: npx tsc --noEmit
      - run: npx vite build
