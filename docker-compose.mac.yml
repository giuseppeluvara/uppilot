# Override per Mac Apple Silicon: Ollama gira sull'HOST (GPU Metal).
# I container raggiungono l'host via host.docker.internal.
# Uso: docker compose -f docker-compose.yml -f docker-compose.mac.yml up
services:
  backend:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
  worker:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
