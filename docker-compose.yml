# UPPilot — stack base (cross-platform).
# Ollama NON è incluso qui: su Mac gira sull'host (override mac), su Linux usare l'override ollama.
services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-uppilot}
      POSTGRES_USER: ${POSTGRES_USER:-uppilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uppilot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uppilot}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    env_file: .env
    volumes:
      - ./backend:/app
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "8000:8000"

  worker:
    build: ./backend
    restart: unless-stopped
    command: celery -A config worker -l info
    env_file: .env
    volumes:
      - ./backend:/app
      - media:/app/media
    depends_on:
      - backend
      - redis

  privacy-filter:
    build: ./privacy-filter
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 10
    volumes:
      - hf-cache:/root/.cache/huggingface
    ports:
      - "8001:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pgdata:
  media:
  hf-cache:
